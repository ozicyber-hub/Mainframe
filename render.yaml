services:
  - type: web
    name: mainframe-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn ozireport.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mainframe-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: mainframe-api.onrender.com,mainframe-api.ozicyber.com.au
      - key: CORS_ALLOWED_ORIGINS
        value: https://mainframe.ozicyber.com.au,https://mainframe-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://mainframe.ozicyber.com.au,https://mainframe-web.onrender.com
      - key: FRONTEND_URL
        value: https://mainframe.ozicyber.com.au
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "True"
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: HIBP_API_KEY
        sync: false

  - type: web
    name: mainframe-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://mainframe-api.onrender.com

databases:
  - name: mainframe-db
    plan: basic-256mb
    databaseName: mainframe
    user: mainframe
