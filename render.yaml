services:
  - type: web
    name: mainframe-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate && python manage.py repair_report_template_files
    startCommand: gunicorn ozireport.wsgi:application
    disk:
      name: mainframe-media
      mountPath: /var/data/mainframe-media
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mainframe-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com,mainframe-api.ozicyber.com.au
      - key: CORS_ALLOWED_ORIGINS
        value: https://mainframe.ozicyber.com.au
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: ^https://mainframe-web.*\.onrender\.com$,^https://[a-z0-9-]+\.mainframe\.ozicyber\.com\.au$
      - key: CSRF_TRUSTED_ORIGINS
        value: https://mainframe.ozicyber.com.au,https://*.mainframe.ozicyber.com.au
      - key: FRONTEND_URL
        value: https://mainframe.ozicyber.com.au
      - key: MEDIA_ROOT
        value: /var/data/mainframe-media
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: AI_PROVIDER
        value: gemini

  - type: web
    name: mainframe-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://mainframe-api.ozicyber.com.au

databases:
  - name: mainframe-db
    plan: basic-256mb
    databaseName: mainframe
    user: mainframe
